<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내가 좋아하는 아이돌과 함께하는 한국어 연습 🎤</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --purple-mid: #AFA9EC;
      --teal: #1D9E75;
      --gray-bg: #F7F6F3;
      --gray-border: #E2E0D8;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --white: #ffffff;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Noto Sans Thai', sans-serif;
      background: var(--gray-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header-badge {
      display: inline-block;
      background: var(--purple-light);
      color: var(--purple);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      overflow: hidden;
    }

    /* Setup screen */
    #setup { padding: 1.5rem; }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--gray-bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: var(--purple); background: white; }
    .input-row button {
      padding: 10px 18px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .input-row button:hover { opacity: 0.88; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .chip {
      font-size: 13px;
      padding: 5px 13px;
      border: 1px solid var(--gray-border);
      border-radius: 99px;
      cursor: pointer;
      color: var(--text-muted);
      background: var(--gray-bg);
      font-family: inherit;
      transition: all 0.15s;
    }
    .chip:hover {
      background: var(--purple-light);
      color: var(--purple);
      border-color: var(--purple-mid);
    }

    .idol-preview {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--purple-light);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 1.25rem;
    }
    .idol-preview.show { display: flex; }
    .preview-emoji {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .preview-info .name { font-size: 15px; font-weight: 700; color: var(--purple); }
    .preview-info .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .start-btn {
      width: 100%;
      padding: 13px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.3px;
    }
    .start-btn:hover { opacity: 0.88; }
    .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Chat screen */
    #chat { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-border);
      background: white;
    }
    .topbar-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .topbar-info .name { font-size: 14px; font-weight: 700; color: var(--text); }
    .topbar-info .status { font-size: 11px; color: var(--teal); margin-top: 1px; }
    .back-btn {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border: 1px solid var(--gray-border);
      padding: 5px 11px;
      border-radius: 99px;
      background: none;
      font-family: inherit;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--purple); color: var(--purple); }

    .messages {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--gray-bg);
    }

    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 18px;
    }
    .msg-inner { display: flex; flex-direction: column; }
    .msg-name { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .msg.user .msg-name { text-align: right; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: white;
      border: 1px solid var(--gray-border);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--purple);
      color: white;
      border-color: transparent;
    }

    .typing-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 0 16px 8px;
      background: var(--gray-bg);
    }
    .typing-indicator.show { display: flex; }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple-mid);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .typing-text { font-size: 12px; color: var(--text-muted); }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--gray-border);
      background: white;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--gray-border);
      border-radius: 99px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      background: var(--gray-bg);
      transition: border-color 0.15s;
    }
    .input-area input:focus { border-color: var(--purple); background: white; }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--purple);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.88; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Score card */
    .score-card {
      background: white;
      border: 1px solid var(--gray-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-top: 4px;
    }
    .score-card .title {
      font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .score-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--text-muted);
      padding: 4px 0;
      border-bottom: 1px solid var(--gray-bg);
    }
    .score-row:last-of-type { border-bottom: none; }
    .score-total {
      text-align: center;
      font-size: 22px; font-weight: 700;
      color: var(--purple);
      margin-top: 10px;
    }
    .score-total span { font-size: 13px; color: var(--text-muted); font-weight: 400; }

    .restart-btn {
      display: block; width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: var(--purple-light);
      color: var(--purple);
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: opacity 0.15s;
    }
    .restart-btn:hover { opacity: 0.8; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-badge">🇰🇷 한국어 회화 연습</div>
    <h1>내가 좋아하는 아이돌과<br/>함께하는 -(으)려면 연습</h1>
    <p>좋아하는 아이돌을 선택하고 한국어로 대화해 보세요!</p>
  </div>

  <div class="card">
    <!-- Setup Screen -->
    <div id="setup">
      <span class="label">아이돌 이름 입력</span>
      <div class="input-row">
        <input type="text" id="idolInput" placeholder="예: 아이유, 정국, 제니..." />
        <button onclick="setIdol()">선택</button>
      </div>
      <span class="label">빠른 선택</span>
      <div class="chips">
        <button class="chip" onclick="quickSet('아이유')">🌸 아이유</button>
        <button class="chip" onclick="quickSet('BTS 정국')">⭐ BTS 정국</button>
        <button class="chip" onclick="quickSet('BLACKPINK 제니')">💎 BLACKPINK 제니</button>
        <button class="chip" onclick="quickSet('태양')">☀️ 태양</button>
        <button class="chip" onclick="quickSet('IVE 장원영')">🌹 IVE 장원영</button>
        <button class="chip" onclick="quickSet('뉴진스 하니')">🐰 뉴진스 하니</button>
      </div>
      <div id="idolPreview" class="idol-preview">
        <div class="preview-emoji" id="previewEmoji">🎤</div>
        <div class="preview-info">
          <div class="name" id="previewName"></div>
          <div class="sub">한국어 회화 파트너로 선택되었어요!</div>
        </div>
      </div>
      <button class="start-btn" id="startBtn" disabled onclick="startChat()">
        대화 시작하기! 🎤
      </button>
    </div>

    <!-- Chat Screen -->
    <div id="chat">
      <div class="topbar">
        <div class="topbar-avatar" id="topbarEmoji">🎤</div>
        <div class="topbar-info">
          <div class="name" id="topbarName"></div>
          <div class="status">● 온라인</div>
        </div>
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="typing-text" id="typingText">입력 중...</span>
      </div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="한국어로 대답해 보세요..." onkeydown="if(event.key==='Enter')sendMessage()" />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <div class="footer">초급 2 학습자 대상 · -(으)려면 문법 집중 연습</div>
</div>

<script>
  const EMOJIS = { '아이유':'🌸','정국':'⭐','제니':'💎','태양':'☀️','장원영':'🌹','하니':'🐰' };
  let idolName = '', chatHistory = [];

  function getEmoji(name) {
    for (const k in EMOJIS) if (name.includes(k)) return EMOJIS[k];
    return '🎤';
  }

  function quickSet(name) {
    document.getElementById('idolInput').value = name;
    setIdol();
  }

  function setIdol() {
    const val = document.getElementById('idolInput').value.trim();
    if (!val) return;
    idolName = val;
    const emoji = getEmoji(val);
    document.getElementById('previewEmoji').textContent = emoji;
    document.getElementById('previewName').textContent = val;
    document.getElementById('idolPreview').classList.add('show');
    document.getElementById('startBtn').disabled = false;
  }

  function startChat() {
    idolName = document.getElementById('idolInput').value.trim() || idolName;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat').style.display = 'block';
    const emoji = getEmoji(idolName);
    document.getElementById('topbarEmoji').textContent = emoji;
    document.getElementById('topbarName').textContent = idolName;
    chatHistory = [];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('userInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    sendFirstMessage();
  }

  function goBack() {
    document.getElementById('chat').style.display = 'none';
    document.getElementById('setup').style.display = 'block';
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'msg-avatar';
    avatarDiv.textContent = role === 'user' ? '🙋' : getEmoji(idolName);
    const inner = document.createElement('div');
    inner.className = 'msg-inner';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'msg-name';
    nameDiv.textContent = role === 'user' ? '나' : idolName;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    inner.appendChild(nameDiv);
    inner.appendChild(bubble);
    div.appendChild(avatarDiv);
    div.appendChild(inner);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping(show) {
    const el = document.getElementById('typingIndicator');
    document.getElementById('typingText').textContent = idolName + ' 이(가) 입력 중...';
    el.classList.toggle('show', show);
    if (show) document.getElementById('messages').scrollTop = 99999;
  }

  function buildSystem() {
    return `당신은 ${idolName}입니다. ${idolName}의 말투, 성격, 관심사를 반영하여 대화하세요.
학습자 수준: 초급 2 (태국인 학습자)
주제: 꿈, 희망 직업, 고민
핵심 문법: -(으)려면

규칙:
- 학습자에게 ${idolName} 본인으로서 한국 친구처럼 역할하세요. 아요/어요체 사용.
- 꿈, 희망 직업, 고민에 대한 질문을 총 10개 하세요. 한 번에 하나씩만 질문하세요.
- 학습자가 대답한 후 관련된 질문을 자연스럽게 이어 주세요.
- 학습자가 -(으)려면을 최소 3번 이상 쓸 수 있도록 자연스럽게 유도하세요.
- 대화 중에는 틀린 부분을 바로 고치지 마세요.
- 질문이 10개 끝나면 반드시 다음을 제공하세요:
  1. 피드백: 칭찬 먼저, 그 다음 틀린 문장과 수정된 문장 (한국어로)
  2. 점수 형식 (반드시 아래 형식 사용):
  [점수]
  -(으)려면: X/4
  어휘: X/3
  문장 구성: X/3
  총점: X/10
  [/점수]`;
  }

  function parseScore(text) {
    const m = text.match(/\[점수\]([\s\S]*?)\[\/점수\]/);
    if (!m) return null;
    const b = m[1];
    const get = (label) => { const r = b.match(new RegExp(label + '[^:]*:\\s*(\\d+)')); return r ? r[1] : '?'; };
    return { grammar: get('\\(으\\)려면'), vocab: get('어휘'), sentence: get('문장 구성'), total: get('총점') };
  }

  function showScoreCard(score) {
    const msgs = document.getElementById('messages');
    const card = document.createElement('div');
    card.className = 'score-card';
    card.innerHTML = `
      <div class="title">🏆 최종 점수</div>
      <div class="score-row"><span>-(으)려면 사용 정확성</span><span><b>${score.grammar}</b>/4점</span></div>
      <div class="score-row"><span>어휘</span><span><b>${score.vocab}</b>/3점</span></div>
      <div class="score-row"><span>전반적인 문장 구성</span><span><b>${score.sentence}</b>/3점</span></div>
      <div class="score-total">${score.total}<span> / 10점</span></div>
      <button class="restart-btn" onclick="goBack()">🔄 다른 아이돌과 다시 연습하기</button>`;
    msgs.appendChild(card);
    msgs.scrollTop = msgs.scrollHeight;
    document.getElementById('userInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  }

  async function callAPI(userMsg) {
    if (userMsg) chatHistory.push({ role: 'user', content: userMsg });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystem(),
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content.map(b => b.text || '').join('');
    chatHistory.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function sendFirstMessage() {
    document.getElementById('sendBtn').disabled = true;
    showTyping(true);
    try {
      chatHistory.push({ role: 'user', content: '안녕하세요! 대화를 시작해 주세요.' });
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: buildSystem(),
          messages: chatHistory
        })
      });
      const data = await res.json();
      const reply = data.content.map(b => b.text || '').join('');
      chatHistory.push({ role: 'assistant', content: reply });
      showTyping(false);
      addMessage('ai', reply);
    } catch(e) {
      showTyping(false);
      addMessage('ai', '연결 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
    }
    document.getElementById('sendBtn').disabled = false;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    document.getElementById('sendBtn').disabled = true;
    showTyping(true);
    try {
      const reply = await callAPI(text);
      showTyping(false);
      const clean = reply.replace(/\[점수\][\s\S]*?\[\/점수\]/, '').trim();
      if (clean) addMessage('ai', clean);
      const score = parseScore(reply);
      if (score) showScoreCard(score);
    } catch(e) {
      showTyping(false);
      addMessage('ai', '오류가 발생했어요. 다시 시도해 주세요.');
    }
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
